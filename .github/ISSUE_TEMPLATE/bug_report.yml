name: Bug report
description: Report a reproducible problem in PantryOps.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include reproducible details.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem.
      placeholder: Cooking preview fails when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps to trigger the issue.
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead.
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Version / commit
      description: Commit SHA, tag, or branch tested.
      placeholder: main@abcdef1
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Bun version, and relevant setup details.
      placeholder: Windows 11, Chrome 131, Bun 1.2.2, Docker 27...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Add relevant logs, stack traces, or screenshots.
      render: shell
    validations:
      required: false
