version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bettergrocy-db
    environment:
      POSTGRES_USER: bettergrocy
      POSTGRES_PASSWORD: bettergrocy
      POSTGRES_DB: bettergrocy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bettergrocy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
